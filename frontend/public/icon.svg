<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="22" stroke-linecap="round">
    <!-- Outer ring -->
    <circle r="168" opacity="0.3"/>
    <!-- Inner ring -->
    <circle r="109"/>
    <!-- Hub -->
    <circle r="38" fill="#fff" fill-opacity="0.9" stroke="none"/>
    <!-- 6 spokes -->
    <line x1="0" y1="-109" x2="0" y2="-168"/>
    <line x1="94.4" y1="-54.5" x2="145.5" y2="-84"/>
    <line x1="94.4" y1="54.5" x2="145.5" y2="84"/>
    <line x1="0" y1="109" x2="0" y2="168"/>
    <line x1="-94.4" y1="54.5" x2="-145.5" y2="84"/>
    <line x1="-94.4" y1="-54.5" x2="-145.5" y2="-84"/>
    <!-- Spoke handles -->
    <circle cx="0" cy="-179" r="17" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="155" cy="-89.5" r="17" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="155" cy="89.5" r="17" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="0" cy="179" r="17" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="-155" cy="89.5" r="17" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="-155" cy="-89.5" r="17" fill="#fff" stroke="none" opacity="0.8"/>
  </g>
</svg>
