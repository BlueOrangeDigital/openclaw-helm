<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Helm wheel (ship's wheel) -->
  <g transform="translate(16,16)" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
    <!-- Outer ring -->
    <circle r="10.5" opacity="0.35"/>
    <!-- Inner ring -->
    <circle r="6.8"/>
    <!-- Hub -->
    <circle r="2.4" fill="#fff" fill-opacity="0.9" stroke="none"/>
    <!-- Spokes (6) -->
    <line x1="0" y1="-6.8" x2="0" y2="-10.5"/>
    <line x1="5.89" y1="-3.4" x2="9.09" y2="-5.25"/>
    <line x1="5.89" y1="3.4" x2="9.09" y2="5.25"/>
    <line x1="0" y1="6.8" x2="0" y2="10.5"/>
    <line x1="-5.89" y1="3.4" x2="-9.09" y2="5.25"/>
    <line x1="-5.89" y1="-3.4" x2="-9.09" y2="-5.25"/>
    <!-- Spoke handles (pegs at outer ring) -->
    <circle cx="0" cy="-11.2" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="9.7" cy="-5.6" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="9.7" cy="5.6" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="0" cy="11.2" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="-9.7" cy="5.6" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
    <circle cx="-9.7" cy="-5.6" r="1.1" fill="#fff" stroke="none" opacity="0.8"/>
  </g>
</svg>
